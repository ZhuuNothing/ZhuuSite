kind = "web"
previewPath = "/"
title = "ZhuuVIP — Underwater Digital World"
version = "1.0.0"
id = "artifacts/zhuuvip"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25102

[services.development]
run = "pnpm --filter @workspace/zhuuvip run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zhuuvip", "run", "build" ]
publicDir = "artifacts/zhuuvip/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25102"
BASE_PATH = "/"
